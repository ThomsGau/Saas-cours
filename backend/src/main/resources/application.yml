spring:
  application:
    name: saas-cours-api

  datasource:
    url: jdbc:postgresql://localhost:5433/saas_cours
    username: saas
    password: saas
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 8080

# Préparé pour l'étape 3 (JWT)
app:
  jwt:
    secret: ${JWT_SECRET:change-me-in-production-use-at-least-256-bits-secret-key-for-hs256}
    expiration-ms: 86400000

  stripe:
    api-key: ${STRIPE_API_KEY:sk_test_change_me}
    webhook-secret: ${STRIPE_WEBHOOK_SECRET:whsec_change_me}
    success-url: ${STRIPE_SUCCESS_URL:http://localhost:3000/payment/success}
    cancel-url: ${STRIPE_CANCEL_URL:http://localhost:3000/payment/cancel}
    subscription-price-id: ${STRIPE_SUBSCRIPTION_PRICE_ID:price_change_me}
    private-session-price-cents: ${STRIPE_PRIVATE_SESSION_PRICE_CENTS:5000}

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.springframework.security: INFO
