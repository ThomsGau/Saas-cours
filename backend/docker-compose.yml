services:
  postgres:
    image: postgres:16-alpine
    container_name: saas-cours-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: saas_cours
      POSTGRES_USER: saas
      POSTGRES_PASSWORD: saas
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U saas -d saas_cours"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
